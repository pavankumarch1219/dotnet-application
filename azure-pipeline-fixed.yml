# ============================================================
# Azure DevOps Pipeline — eShop (.NET 8 + Kubernetes)
# Clean final version — RabbitMQ CrashLoopBackOff fix included
# ============================================================

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  name: demo-pool

variables:
  - group: docker-credentials
  - name: dockerHubRepo
    value: pavankumarch1219
  - name: imageTag
    value: $(Build.BuildId)
  - name: namespace
    value: eshop

# ================================================================
# STAGE 1 — Build & Test
# ================================================================
stages:
- stage: Build
  displayName: "Build & Test"
  jobs:
  - job: BuildJob
    displayName: "Restore, Build, Test"
    timeoutInMinutes: 30
    steps:

    - task: UseDotNet@2
      displayName: "Install .NET 8 SDK"
      inputs:
        packageType: sdk
        version: 8.0.x

    - script: |
        set -e
        echo "=== Restoring ==="
        dotnet restore src/Catalog.API/Catalog.API.csproj
        dotnet restore src/Basket.API/Basket.API.csproj
        dotnet restore src/Identity.API/Identity.API.csproj
        dotnet restore src/Ordering.API/Ordering.API.csproj
        dotnet restore src/WebApp/WebApp.csproj
        echo "=== Building ==="
        dotnet build src/Catalog.API/Catalog.API.csproj   --configuration Release --no-restore
        dotnet build src/Basket.API/Basket.API.csproj     --configuration Release --no-restore
        dotnet build src/Identity.API/Identity.API.csproj --configuration Release --no-restore
        dotnet build src/Ordering.API/Ordering.API.csproj --configuration Release --no-restore
        dotnet build src/WebApp/WebApp.csproj             --configuration Release --no-restore
      displayName: "Restore & Build"

    - script: |
        set -e
        RAN_TESTS=false
        for testProject in tests/*.Tests/*.csproj; do
          if [ -f "$testProject" ]; then
            echo "Running: $testProject"
            dotnet test "$testProject" \
              --configuration Release \
              --no-build \
              --logger "trx;LogFileName=results.trx" \
              --results-directory "$(Agent.TempDirectory)/test-results"
            RAN_TESTS=true
          fi
        done
        if [ "$RAN_TESTS" = false ]; then
          echo "No test projects found — skipping."
        fi
      displayName: "Run Unit Tests"
      continueOnError: false

    - task: PublishTestResults@2
      displayName: "Publish Test Results"
      condition: succeededOrFailed()
      inputs:
        testResultsFormat: VSTest
        testResultsFiles: "$(Agent.TempDirectory)/test-results/**/*.trx"
        failTaskOnFailedTests: true

# ================================================================
# STAGE 2 — Docker Build & Push
# ================================================================
- stage: Docker
  displayName: "Docker Build & Push"
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: BuildPush
    displayName: "Build & Push All Images"
    timeoutInMinutes: 45
    steps:

    - task: UseDotNet@2
      displayName: "Install .NET 8 SDK"
      inputs:
        packageType: sdk
        version: 8.0.x

    - script: |
        echo "$(DOCKER_PASSWORD)" | docker login -u "$(DOCKER_USERNAME)" --password-stdin
      displayName: "Docker Hub Login"

    - script: |
        set -e
        TAG=$(imageTag)
        REPO=$(dockerHubRepo)
        build_and_push() {
          SERVICE=$1
          DOCKERFILE=$2
          IMAGE="$REPO/$SERVICE"
          echo "=== Building $IMAGE:$TAG ==="
          docker build -t "$IMAGE:$TAG" -t "$IMAGE:latest" -f "$DOCKERFILE" .
          echo "=== Pushing $IMAGE:$TAG and $IMAGE:latest ==="
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"
        }
        build_and_push "catalog-api"        "src/Catalog.API/Dockerfile"
        build_and_push "basket-api"         "src/Basket.API/Dockerfile"
        build_and_push "identity-api"       "src/Identity.API/Dockerfile"
        build_and_push "ordering-api"       "src/Ordering.API/Dockerfile"
        build_and_push "dotnet-application" "src/WebApp/Dockerfile"
      displayName: "Build & Push All Images"

    - script: docker logout
      displayName: "Docker Logout"
      condition: always()

# ================================================================
# STAGE 3 — Deploy to Kubernetes
# ================================================================
- stage: Deploy
  displayName: "Deploy to Kubernetes"
  dependsOn: Docker
  condition: succeeded()
  jobs:
  - job: DeployJob
    displayName: "K8s Deploy"
    timeoutInMinutes: 45
    steps:

    - script: |
        kubectl version --client
        kubectl cluster-info
      displayName: "Verify kubectl & Cluster"

    - script: |
        kubectl apply -f k8s/namespace.yaml
        echo "Namespace $(namespace) is ready."
      displayName: "Ensure Namespace"

    - script: |
        kubectl apply -f k8s/secret.yaml -n $(namespace)
      displayName: "Apply Secrets"

    - script: |
        kubectl apply -f k8s/configmap.yaml               -n $(namespace)
        kubectl apply -f k8s/postgres-init-configmap.yaml -n $(namespace)
      displayName: "Apply ConfigMaps"

    - script: |
        kubectl apply -f k8s/postgres-pvc.yaml -n $(namespace) || true
      displayName: "Apply PVC"

    # ── RabbitMQ: patch deployment to use safe TCP probes + inline credentials
    # before applying, so the rollout never produces a CrashLoopBackOff pod.
    # Root cause from logs:
    #   - new pod uses rabbitmq-secret + rabbitmq-diagnostics probe  → CrashLoop
    #   - old pod uses guest/guest   + tcp-socket probe              → Healthy
    # Fix: patch the live deployment to match the working pod spec,
    # then apply the YAML so it stays idempotent on future runs.
    - script: |
        set -e
        NS=$(namespace)

        echo "=== Patching RabbitMQ deployment to safe probe + inline creds ==="
        kubectl patch deployment rabbitmq -n $NS --type='json' -p='[
          {
            "op": "replace",
            "path": "/spec/template/spec/containers/0/livenessProbe",
            "value": {
              "tcpSocket": {"port": 5672},
              "initialDelaySeconds": 20,
              "periodSeconds": 10,
              "failureThreshold": 5
            }
          },
          {
            "op": "replace",
            "path": "/spec/template/spec/containers/0/readinessProbe",
            "value": {
              "tcpSocket": {"port": 5672},
              "initialDelaySeconds": 10,
              "periodSeconds": 5,
              "failureThreshold": 5
            }
          },
          {
            "op": "replace",
            "path": "/spec/template/spec/containers/0/env",
            "value": [
              {"name": "RABBITMQ_DEFAULT_USER", "value": "guest"},
              {"name": "RABBITMQ_DEFAULT_PASS", "value": "guest"},
              {"name": "RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS",
               "value": "-rabbit disk_free_limit 50000000"}
            ]
          }
        ]' 2>/dev/null || echo "Patch skipped (deployment may not exist yet)"

        echo "=== Applying RabbitMQ manifests ==="
        kubectl apply -f k8s/rabbitmq-deployment.yaml -n $NS
        kubectl apply -f k8s/rabbitmq-service.yaml    -n $NS

        echo "=== Deleting any CrashLoopBackOff or Terminating RabbitMQ pods ==="
        kubectl get pods -n $NS -l app=rabbitmq -o name \
          | xargs -r -I{} sh -c \
            'kubectl get {} -n '"$NS"' -o jsonpath="{.status.containerStatuses[0].state.waiting.reason}" 2>/dev/null | grep -qE "CrashLoop|Error|Terminating" && kubectl delete {} --grace-period=0 --force -n '"$NS"' || true'

        echo "=== Applying Postgres manifests ==="
        kubectl apply -f k8s/postgres-deployment.yaml -n $NS
        kubectl apply -f k8s/postgres-service.yaml    -n $NS
      displayName: "Deploy Infrastructure (Postgres + RabbitMQ)"

    - script: |
        kubectl delete pod -l app=postgres -n $(namespace) --ignore-not-found=true
        echo "Waiting for Postgres..."
        kubectl wait --for=condition=ready pod \
          -l app=postgres -n $(namespace) --timeout=180s
      displayName: "Restart Postgres & Wait"

    # Wait for RabbitMQ: poll until the pod is actually Ready (tcp :5672 passing)
    # instead of relying on rollout status which fails on progress deadline.
    - script: |
        set -e
        NS=$(namespace)
        echo "=== Waiting for RabbitMQ pod to be Ready ==="

        RETRIES=36   # 36 x 5s = 3 minutes
        COUNT=0
        until kubectl get pods -l app=rabbitmq -n $NS \
              -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}' \
              2>/dev/null | grep -q "True"; do
          COUNT=$((COUNT + 1))
          if [ $COUNT -ge $RETRIES ]; then
            echo "ERROR: RabbitMQ pod never became Ready after 3 min."
            kubectl describe pods -l app=rabbitmq -n $NS || true
            kubectl logs -l app=rabbitmq -n $NS --tail=40 || true
            exit 1
          fi
          echo "  Waiting... attempt $COUNT/$RETRIES"
          sleep 5
        done

        echo "RabbitMQ is Ready."
        kubectl get pods -l app=rabbitmq -n $NS
      displayName: "Wait for RabbitMQ (pod Ready poll)"

    - script: |
        kubectl apply -f k8s/ingress.yaml -n $(namespace)
      displayName: "Apply Ingress"

    - script: |
        kubectl apply -f k8s/catalog-service.yaml  -n $(namespace)
        kubectl apply -f k8s/basket-service.yaml   -n $(namespace)
        kubectl apply -f k8s/identity-service.yaml -n $(namespace)
        kubectl apply -f k8s/ordering-service.yaml -n $(namespace)
        kubectl apply -f k8s/dotnet-service.yaml   -n $(namespace)
        kubectl apply -f k8s/service.yaml          -n $(namespace)
      displayName: "Apply Application Services"

    - script: |
        kubectl apply -f k8s/catalog-deployment.yaml  -n $(namespace)
        kubectl apply -f k8s/basket-deployment.yaml   -n $(namespace)
        kubectl apply -f k8s/identity-deployment.yaml -n $(namespace)
        kubectl apply -f k8s/ordering-deployment.yaml -n $(namespace)
        kubectl apply -f k8s/deployment.yaml          -n $(namespace)
      displayName: "Apply Application Deployments"

    - script: |
        set -e
        TAG=$(imageTag)
        REPO=$(dockerHubRepo)
        NS=$(namespace)
        kubectl set image deployment/catalog-api  catalog-api=$REPO/catalog-api:$TAG       -n $NS
        kubectl set image deployment/basket-api   basket-api=$REPO/basket-api:$TAG         -n $NS
        kubectl set image deployment/identity-api identity-api=$REPO/identity-api:$TAG     -n $NS
        kubectl set image deployment/ordering-api ordering-api=$REPO/ordering-api:$TAG     -n $NS
        kubectl set image deployment/dotnet-app   dotnet-app=$REPO/dotnet-application:$TAG -n $NS
        kubectl rollout restart deployment/catalog-api  -n $NS
        kubectl rollout restart deployment/basket-api   -n $NS
        kubectl rollout restart deployment/identity-api -n $NS
        kubectl rollout restart deployment/ordering-api -n $NS
        kubectl rollout restart deployment/dotnet-app   -n $NS
      displayName: "Update Images & Restart Pods"

    - script: |
        set -e
        NS=$(namespace)
        for dep in catalog-api basket-api identity-api ordering-api dotnet-app; do
          echo "Waiting for $dep..."
          kubectl rollout status deployment/$dep -n $NS --timeout=180s \
            || { echo "ERROR: $dep failed"; kubectl describe deployment/$dep -n $NS; exit 1; }
        done
        echo "=== All deployments healthy ==="
        kubectl get pods    -n $NS
        kubectl get svc     -n $NS
        kubectl get ingress -n $NS
      displayName: "Wait for Rollout & Verify"

    - script: |
        set -e
        NS=$(namespace)
        EXTERNAL_IP=$(kubectl get ingress eshop-ingress -n $NS \
          -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
        if [ -z "$EXTERNAL_IP" ]; then
          EXTERNAL_IP=$(kubectl get nodes \
            -o jsonpath='{.items[0].status.addresses[?(@.type=="ExternalIP")].address}')
          PORT=":30694"
        else
          PORT=""
        fi
        BASE="http://$EXTERNAL_IP$PORT"
        echo "Smoke tests against: $BASE"
        FAILED=false
        check() {
          CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$2" || echo "000")
          if [ "$CODE" = "$3" ]; then
            echo "PASS [$CODE] $1"
          else
            echo "FAIL [$CODE] $1 (expected $3) -> $2"
            FAILED=true
          fi
        }
        check "Frontend"        "$BASE/"                "200"
        check "Identity UI"     "$BASE/identity"        "200"
        check "Catalog health"  "$BASE/catalog/health"  "200"
        check "Basket health"   "$BASE/basket/health"   "200"
        check "Ordering health" "$BASE/ordering/health" "200"
        if [ "$FAILED" = true ]; then
          echo "Smoke tests FAILED. Pod logs:"
          kubectl logs deployment/basket-api  -n $NS --tail=30 || true
          kubectl logs deployment/catalog-api -n $NS --tail=30 || true
          exit 1
        fi
        echo "All smoke tests passed!"
      displayName: "Smoke Tests"
