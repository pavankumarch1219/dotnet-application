trigger: none
- main

pool:
  name: agent-vayu

variables:

- group: docker-credentials

- name: dockerHubRepo
  value: pavankumarch1219/dotnet-application

- name: imageTag
  value: $(Build.BuildId)

stages:

# ---------------- BUILD STAGE ----------------

- stage: Build
  displayName: Build .NET Application

  jobs:
  - job: BuildJob

    steps:

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: 10.0.x

    - script: |
        echo "Restoring dependencies"
        dotnet restore src/WebApp/WebApp.csproj

        echo "Building application"
        dotnet build src/WebApp/WebApp.csproj --configuration Release --no-restore
      displayName: Build Project


# ---------------- DOCKER BUILD ----------------

- stage: DockerBuild
  displayName: Build and Push Docker Image
  dependsOn: Build

  jobs:
  - job: DockerJob

    steps:

    - script: |
        echo "Login to DockerHub"
        docker login -u $(DOCKER_USERNAME) -p $(DOCKER_PASSWORD)

        echo "Building Docker Image"
        docker build -t $(dockerHubRepo):$(imageTag) .

        echo "Push Image"
        docker push $(dockerHubRepo):$(imageTag)

      displayName: Docker Build and Push


# ---------------- DEPLOY STAGE ----------------

- stage: Deploy
  displayName: Deploy to Kubernetes
  dependsOn: DockerBuild

  jobs:
  - job: DeployJob

    steps:

    - script: |

        echo "Applying Kubernetes manifests"

        kubectl apply -f k8s/configmap.yaml
        kubectl apply -f k8s/deployment.yaml
        kubectl apply -f k8s/service.yaml

        echo "Updating image"

        kubectl set image deployment/dotnet-app \
        dotnet-app=$(dockerHubRepo):$(imageTag)

        echo "Waiting for rollout"

        kubectl rollout status deployment/dotnet-app

      displayName: Deploy to Kubernetes
