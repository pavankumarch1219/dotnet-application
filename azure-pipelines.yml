trigger: none
- main

pool:
  name: agent-vayu

variables:
- group: docker-credentials

- name: dockerHubRepo
  value: pavankumarch1219/dotnet-application

- name: imageTag
  value: $(Build.BuildId)

stages:

# ---------------- BUILD STAGE ----------------

- stage: Build
  displayName: Build .NET Application

  jobs:
  - job: BuildJob
    displayName: Restore and Build

    steps:

    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: 10.0.x

    - script: |
        echo "Restoring dependencies"
        dotnet restore src/WebApp/WebApp.csproj

        echo "Building application"
        dotnet build src/WebApp/WebApp.csproj --configuration Release --no-restore
      displayName: Build Project


# ---------------- DOCKER BUILD ----------------

- stage: DockerBuild
  displayName: Build and Push Docker Image
  dependsOn: Build

  jobs:
  - job: DockerJob
    displayName: Docker Build and Push

    steps:

    - script: |
        echo "Building Docker Image"
        docker build -t $(dockerHubRepo):$(imageTag) .
      displayName: Docker Build

    - script: |
        echo "Login to DockerHub"
        docker login -u $(DOCKER_USERNAME) -p $(DOCKER_PASSWORD)

        echo "Push Image"
        docker push $(dockerHubRepo):$(imageTag)
      displayName: Docker Push


# ---------------- DEPLOY STAGE ----------------

- stage: Deploy
  displayName: Deploy to Kubernetes
  dependsOn: DockerBuild

  jobs:
  - job: DeployJob
    displayName: Deploy to K8s

    steps:

    - script: |
        echo "Checking Kubernetes deployment..."

        if kubectl get deployment dotnet-app; then
          echo "Deployment exists, updating image..."
          kubectl set image deployment/dotnet-app dotnet-app=$(dockerHubRepo):$(imageTag)
        else
          echo "Deployment not found, creating deployment..."
          kubectl create deployment dotnet-app --image=$(dockerHubRepo):$(imageTag)

          kubectl expose deployment dotnet-app \
            --type=NodePort \
            --port=80 \
            --target-port=80
        fi

        echo "Waiting for rollout..."
        kubectl rollout status deployment/dotnet-app

      displayName: Deploy to Kubernetes
