trigger:
- main

pool:
  name: agent-vayu

variables:
- group: docker-credentials

- name: dockerHubRepo
  value: pavankumarch1219

- name: imageTag
  value: $(Build.BuildId)

stages:

# ---------------- BUILD STAGE ----------------

- stage: Build
  displayName: Build .NET Application

  jobs:
  - job: BuildJob

    steps:
    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: 10.0.x

    - script: |
        echo "Restoring dependencies"
        dotnet restore src/WebApp/WebApp.csproj

        echo "Building application"
        dotnet build src/WebApp/WebApp.csproj --configuration Release --no-restore
      displayName: Build Project


# ---------------- DOCKER BUILD ----------------

- stage: DockerBuild
  displayName: Build and Push Docker Images
  dependsOn: Build

  jobs:
  - job: DockerJob

    steps:
    - script: |
        echo "Login to DockerHub"
        docker login -u $(DOCKER_USERNAME) -p $(DOCKER_PASSWORD)

        echo "Build WebApp"
        docker build -t $(dockerHubRepo)/dotnet-application:$(imageTag) -f src/WebApp/Dockerfile .
        docker push $(dockerHubRepo)/dotnet-application:$(imageTag)

        echo "Build Catalog API"
        docker build -t $(dockerHubRepo)/catalog-api:latest -f src/Catalog.API/Dockerfile .
        docker push $(dockerHubRepo)/catalog-api:latest

        echo "Build Basket API"
        docker build -t $(dockerHubRepo)/basket-api:latest -f src/Basket.API/Dockerfile .
        docker push $(dockerHubRepo)/basket-api:latest

        echo "Build Identity API"
        docker build -t $(dockerHubRepo)/identity-api:latest -f src/Identity.API/Dockerfile .
        docker push $(dockerHubRepo)/identity-api:latest

        echo "Build Ordering API"
        docker build -t $(dockerHubRepo)/ordering-api:latest -f src/Ordering.API/Dockerfile .
        docker push $(dockerHubRepo)/ordering-api:latest
      displayName: Build and Push Images


# ---------------- DEPLOY STAGE ----------------

- stage: Deploy
  displayName: Deploy to Kubernetes
  dependsOn: DockerBuild

  jobs:
  - job: DeployJob

    steps:
    - script: |
        echo "Applying Kubernetes manifests"
        kubectl apply -f k8s/

        echo "Updating WebApp image"
        kubectl set image deployment/dotnet-app dotnet-app=$(dockerHubRepo)/dotnet-application:$(imageTag)

        echo "Waiting for rollout"
        kubectl rollout status deployment/dotnet-app

        echo "Cluster status"
        kubectl get pods
        kubectl get svc
      displayName: Deploy to Kubernetes
