trigger:
- main

pool:
  name: agent-vayu

variables:
- group: docker-credentials

- name: dockerHubRepo
  value: pavankumarch1219/dotnet-application

- name: imageTag
  value: $(Build.BuildId)

stages:

# ================= BUILD STAGE =================

- stage: Build
  displayName: Build .NET Application

  jobs:
  - job: BuildJob
    displayName: Restore and Build

    steps:

    - task: UseDotNet@2
      inputs:
        packageType: 'sdk'
        version: '8.x'

    - script: |
        echo "Restoring dependencies..."
        dotnet restore

        echo "Building application..."
        dotnet build --configuration Release
      displayName: Build Project


# ================= DOCKER BUILD STAGE =================

- stage: DockerBuild
  displayName: Build and Push Docker Image
  dependsOn: Build

  jobs:
  - job: DockerJob
    displayName: Docker Build and Push

    steps:

    - script: |
        echo "Building Docker Image..."
        docker build -t $(dockerHubRepo):$(imageTag) .
      displayName: Docker Build

    - script: |
        echo "Login to DockerHub"
        docker login -u $(DOCKER_USERNAME) -p $(DOCKER_PASSWORD)

        echo "Push image to DockerHub"
        docker push $(dockerHubRepo):$(imageTag)
      displayName: Docker Push


# ================= DEPLOY STAGE =================

- stage: Deploy
  displayName: Deploy to Kubernetes
  dependsOn: DockerBuild

  jobs:
  - job: DeployJob
    displayName: Kubernetes Deployment

    steps:

    - script: |
        echo "Updating Kubernetes Deployment..."

        kubectl set image deployment/dotnet-app dotnet-app=$(dockerHubRepo):$(imageTag)

        echo "Checking rollout status..."
        kubectl rollout status deployment/dotnet-app
      displayName: Deploy Application
