trigger:
- main

pool:
  name: agent-vayu

variables:
- group: docker-credentials

- name: dockerHubRepo
  value: pavankumarch1219

- name: imageTag
  value: $(Build.BuildId)

- name: namespace
  value: eshop


# ================= BUILD =================
stages:
- stage: Build
  displayName: Build .NET 10 Apps
  jobs:
  - job: BuildJob
    steps:

    - task: UseDotNet@2
      displayName: Install .NET 10 SDK (Preview)
      inputs:
        packageType: sdk
        version: 10.0.x
        includePreviewVersions: true

    - script: |
        echo "Verify .NET version"
        dotnet --version

        echo "Restore"
        dotnet restore

        echo "Build"
        dotnet build --configuration Release --no-restore

      displayName: Restore & Build


# ================= DOCKER =================
- stage: Docker
  displayName: Build & Push Images
  dependsOn: Build
  jobs:
  - job: DockerJob
    steps:

    - script: |
        echo "Login to DockerHub"
        echo "$(DOCKER_PASSWORD)" | docker login -u "$(DOCKER_USERNAME)" --password-stdin

      displayName: Docker Login


    - script: |
        set -e

        echo "========== BUILD & PUSH ALL SERVICES =========="

        SERVICES=("catalog-api" "basket-api" "identity-api" "ordering-api")

        for SERVICE in "${SERVICES[@]}"; do
          echo "Building $SERVICE"

          docker build \
            -t $(dockerHubRepo)/$SERVICE:$(imageTag) \
            -f src/$(echo $SERVICE | sed 's/-api/.API/')/Dockerfile .

          docker tag $(dockerHubRepo)/$SERVICE:$(imageTag) $(dockerHubRepo)/$SERVICE:latest

          docker push $(dockerHubRepo)/$SERVICE:$(imageTag)
          docker push $(dockerHubRepo)/$SERVICE:latest
        done

        echo "========== BUILD DOTNET WEB APP =========="

        docker build \
          -t $(dockerHubRepo)/dotnet-application:$(imageTag) \
          -f src/WebApp/Dockerfile .

        docker tag $(dockerHubRepo)/dotnet-application:$(imageTag) $(dockerHubRepo)/dotnet-application:latest

        docker push $(dockerHubRepo)/dotnet-application:$(imageTag)
        docker push $(dockerHubRepo)/dotnet-application:latest

      displayName: Build & Push Docker Images


# ================= DEPLOY =================
- stage: Deploy
  displayName: Deploy to Kubernetes
  dependsOn: Docker
  jobs:
  - job: DeployJob
    steps:

    - script: |
        set -e

        echo "Create namespace if not exists"
        kubectl get namespace $(namespace) || kubectl create namespace $(namespace)

        echo "Apply manifests"
        kubectl apply -f k8s/ -n $(namespace)

        echo "Rolling update images"

        kubectl set image deployment/catalog-api catalog-api=$(dockerHubRepo)/catalog-api:$(imageTag) -n $(namespace)
        kubectl set image deployment/basket-api basket-api=$(dockerHubRepo)/basket-api:$(imageTag) -n $(namespace)
        kubectl set image deployment/identity-api identity-api=$(dockerHubRepo)/identity-api:$(imageTag) -n $(namespace)
        kubectl set image deployment/ordering-api ordering-api=$(dockerHubRepo)/ordering-api:$(imageTag) -n $(namespace)
        kubectl set image deployment/dotnet-app dotnet-app=$(dockerHubRepo)/dotnet-application:$(imageTag) -n $(namespace)

        echo "Waiting for rollout"

        kubectl rollout status deployment/catalog-api -n $(namespace)
        kubectl rollout status deployment/basket-api -n $(namespace)
        kubectl rollout status deployment/identity-api -n $(namespace)
        kubectl rollout status deployment/ordering-api -n $(namespace)
        kubectl rollout status deployment/dotnet-app -n $(namespace)

        echo "Cluster Status"
        kubectl get pods -n $(namespace)
        kubectl get svc -n $(namespace)

      displayName: Deploy & Verify
