trigger:
  - main

pool:
  name: agent-vayu

variables:
  - group: docker-credentials

  - name: dockerHubRepo
    value: pavankumarch1219

  - name: imageTag
    value: $(Build.BuildId)

  - name: namespace
    value: eshop

# ================= BUILD =================
stages:
  - stage: Build
    displayName: Build & Test
    jobs:
      - job: BuildJob
        steps:
          - task: UseDotNet@2
            inputs:
              packageType: sdk
              version: 10.0.x
              includePreviewVersions: true

          - script: |
              set -e
              echo "Restore & Build"

              dotnet restore
              dotnet build --configuration Release --no-restore
            displayName: Restore & Build

# ================= DOCKER =================
  - stage: Docker
    displayName: Build & Push Images
    dependsOn: Build
    jobs:
      - job: DockerJob
        steps:

          # 🔐 Secure Login
          - script: |
              echo "$(DOCKER_PASSWORD)" | docker login -u "$(DOCKER_USERNAME)" --password-stdin
            displayName: Docker Login

          # 🔥 Build & Push
          - script: |
              set -e

              build_push () {
                NAME=$1
                PATH=$2

                docker build -t $(dockerHubRepo)/$NAME:$(imageTag) -f $PATH/Dockerfile .
                docker tag $(dockerHubRepo)/$NAME:$(imageTag) $(dockerHubRepo)/$NAME:latest

                docker push $(dockerHubRepo)/$NAME:$(imageTag)
                docker push $(dockerHubRepo)/$NAME:latest
              }

              build_push catalog-api src/Catalog.API
              build_push basket-api src/Basket.API
              build_push identity-api src/Identity.API
              build_push ordering-api src/Ordering.API
              build_push dotnet-application src/WebApp

            displayName: Build & Push All Images

# ================= DEPLOY =================
  - stage: Deploy
    displayName: Deploy to Kubernetes
    dependsOn: Docker
    jobs:
      - job: DeployJob
        steps:

          # 🔍 Validate YAML (CRITICAL)
          - script: |
              kubectl apply --dry-run=client -f k8s/
            displayName: Validate Kubernetes YAML

          # 📦 Namespace
          - script: |
              kubectl get namespace $(namespace) || kubectl create namespace $(namespace)
            displayName: Ensure Namespace

          # 🚀 Apply manifests
          - script: |
              kubectl apply -f k8s/ -n $(namespace)
            displayName: Apply Manifests

          # 🔄 Update Images (Rolling Update)
          - script: |
              set -e

              kubectl set image deployment/catalog-api catalog-api=$(dockerHubRepo)/catalog-api:$(imageTag) -n $(namespace)
              kubectl set image deployment/basket-api basket-api=$(dockerHubRepo)/basket-api:$(imageTag) -n $(namespace)
              kubectl set image deployment/identity-api identity-api=$(dockerHubRepo)/identity-api:$(imageTag) -n $(namespace)
              kubectl set image deployment/ordering-api ordering-api=$(dockerHubRepo)/ordering-api:$(imageTag) -n $(namespace)
              kubectl set image deployment/dotnet-app dotnet-app=$(dockerHubRepo)/dotnet-application:$(imageTag) -n $(namespace)
            displayName: Update Images

          # ⏳ Wait for rollout
          - script: |
              set -e

              kubectl rollout status deployment/catalog-api -n $(namespace)
              kubectl rollout status deployment/basket-api -n $(namespace)
              kubectl rollout status deployment/identity-api -n $(namespace)
              kubectl rollout status deployment/ordering-api -n $(namespace)
              kubectl rollout status deployment/dotnet-app -n $(namespace)
            displayName: Wait for Rollout

          # 📊 Final status
          - script: |
              kubectl get pods -n $(namespace)
              kubectl get svc -n $(namespace)
            displayName: Verify Deployment

          # 🔥 AUTO ROLLBACK (VERY IMPORTANT)
          - script: |
              echo "Rollback triggered"

              kubectl rollout undo deployment/catalog-api -n $(namespace)
              kubectl rollout undo deployment/basket-api -n $(namespace)
              kubectl rollout undo deployment/identity-api -n $(namespace)
              kubectl rollout undo deployment/ordering-api -n $(namespace)
              kubectl rollout undo deployment/dotnet-app -n $(namespace)
            displayName: Rollback on Failure
            condition: failed()
