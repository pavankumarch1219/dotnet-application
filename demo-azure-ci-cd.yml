trigger:
- main

pool:
  name: eshop-agent

variables:
- group: docker-credentials

- name: namespace
  value: eshop

- name: dockerRepo
  value: pavankumarch1219

- name: imageTag
  value: latest


stages:

# =========================
#  SONARQUBE ANALYSIS (v7)
# =========================
- stage: SonarQube
  displayName: Code Quality Check
  jobs:
  - job: SonarJob
    steps:

    # 🔥 MUST INSTALL .NET
    - task: UseDotNet@2
      displayName: Install .NET SDK
      inputs:
        packageType: 'sdk'
        version: '8.0.x'

    # 🔥 FIXED
    - task: SonarQubePrepare@7
      inputs:
        SonarQube: 'sonar-sc'
        scannerMode: 'dotnet'
        projectKey: 'eshop-project'
        projectName: 'eshop-project'

    - script: dotnet restore
      displayName: Restore

    - script: dotnet build --no-restore
      displayName: Build

    - script: dotnet test --no-build
      displayName: Run Tests

    - task: SonarQubeAnalyze@7

    - task: SonarQubePublish@7
      inputs:
        pollingTimeoutSec: '300'


# =========================
#  DOCKER BUILD & PUSH
# =========================
- stage: Docker
  displayName: Build & Push Images
  dependsOn: SonarQube
  condition: succeeded()
  jobs:
  - job: DockerJob
    steps:

    # optional but safe
    - task: UseDotNet@2
      inputs:
        packageType: 'sdk'
        version: '8.0.x'

    - script: |
        echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
      displayName: Docker Login
      env:
        DOCKER_USERNAME: $(DOCKER_USERNAME)
        DOCKER_PASSWORD: $(DOCKER_PASSWORD)

    - script: |
        set -e

        docker build -t $(dockerRepo)/catalog-api:$(imageTag) -f src/Catalog.API/Dockerfile .
        docker push $(dockerRepo)/catalog-api:$(imageTag)

        docker build -t $(dockerRepo)/basket-api:$(imageTag) -f src/Basket.API/Dockerfile .
        docker push $(dockerRepo)/basket-api:$(imageTag)

        docker build -t $(dockerRepo)/identity-api:$(imageTag) -f src/Identity.API/Dockerfile .
        docker push $(dockerRepo)/identity-api:$(imageTag)

        docker build -t $(dockerRepo)/ordering-api:$(imageTag) -f src/Ordering.API/Dockerfile .
        docker push $(dockerRepo)/ordering-api:$(imageTag)

        docker build -t $(dockerRepo)/dotnet-application:$(imageTag) -f src/WebApp/Dockerfile .
        docker push $(dockerRepo)/dotnet-application:$(imageTag)

      displayName: Build & Push Docker Images


# =========================
#  DEPLOY TO K8s
# =========================
- stage: Deploy
  displayName: Deploy to Kubernetes
  dependsOn: Docker
  condition: succeeded()
  jobs:
  - job: DeployJob
    steps:

    - script: kubectl version --client

    - script: |
        kubectl get namespace $(namespace) || kubectl create namespace $(namespace)

    - script: kubectl apply -f k8s/secret.yaml -n $(namespace)

    - script: kubectl apply -f k8s/postgres-deployment.yaml -n $(namespace)
    - script: kubectl rollout status deployment/postgres -n $(namespace) --timeout=300s

    - script: kubectl apply -f k8s/rabbitmq-deployment.yaml -n $(namespace)
    - script: kubectl rollout status deployment/rabbitmq -n $(namespace) --timeout=300s

    - script: kubectl apply -f k8s/redis-deployment.yaml -n $(namespace)
    - script: kubectl rollout status deployment/redis -n $(namespace) --timeout=120s

    - script: kubectl apply -f k8s/catalog-deployment.yaml -n $(namespace)
    - script: kubectl apply -f k8s/basket-deployment.yaml -n $(namespace)
    - script: kubectl apply -f k8s/identity-deployment.yaml -n $(namespace)
    - script: kubectl apply -f k8s/ordering-deployment.yaml -n $(namespace)

    - script: kubectl apply -f k8s/dotnet-deployment.yaml -n $(namespace)

    - script: kubectl apply -f k8s/ingress.yaml -n $(namespace)

    - script: |
        kubectl get pods -n $(namespace)
        kubectl get svc -n $(namespace)
        kubectl get ingress -n $(namespace)
