trigger:
- main

pool:
  name: eshop-agent

variables:
- group: docker-credentials

- name: namespace
  value: eshop

- name: dockerRepo
  value: pavankumarch1219

- name: imageTag
  value: latest

stages:

# =========================
# 🔍 SONARQUBE ANALYSIS
# =========================
- stage: SonarQube
  displayName: Code Quality Check
  jobs:
  - job: SonarJob
    steps:

    # Prepare SonarQube
    - task: SonarQubePrepare@7
      inputs:
        SonarQube: 'sonar-sc'   
        scannerMode: 'MSBuild'
        projectKey: 'eshop-project'
        projectName: 'eshop-project'

    # Restore dependencies
    - script: dotnet restore
      displayName: Restore

    # Build solution
    - script: dotnet build --no-restore
      displayName: Build

    # (Optional but recommended)
    - script: dotnet test --no-build
      displayName: Run Tests

    # Run analysis
    - task: SonarQubeAnalyze@7

    # Publish Quality Gate result
    - task: SonarQubePublish@7
      inputs:
        pollingTimeoutSec: '300'


# =========================
# 🐳 DOCKER BUILD & PUSH
# =========================
- stage: Docker
  displayName: Build & Push Images
  dependsOn: SonarQube
  condition: succeeded()   # ✅ only if Sonar passes
  jobs:
  - job: DockerJob
    steps:

    - script: |
        echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
      displayName: Docker Login
      env:
        DOCKER_USERNAME: $(DOCKER_USERNAME)
        DOCKER_PASSWORD: $(DOCKER_PASSWORD)

    - script: |
        set -e

        docker build -t $(dockerRepo)/catalog-api:latest -f src/Catalog.API/Dockerfile .
        docker push $(dockerRepo)/catalog-api:latest

        docker build -t $(dockerRepo)/basket-api:latest -f src/Basket.API/Dockerfile .
        docker push $(dockerRepo)/basket-api:latest

        docker build -t $(dockerRepo)/identity-api:latest -f src/Identity.API/Dockerfile .
        docker push $(dockerRepo)/identity-api:latest

        docker build -t $(dockerRepo)/ordering-api:latest -f src/Ordering.API/Dockerfile .
        docker push $(dockerRepo)/ordering-api:latest

        docker build -t $(dockerRepo)/dotnet-application:latest -f src/WebApp/Dockerfile .
        docker push $(dockerRepo)/dotnet-application:latest

      displayName: Build & Push Docker Images


# =========================
# 🚀 DEPLOY TO K8s
# =========================
- stage: Deploy
  displayName: Deploy to Kubernetes
  dependsOn: Docker
  jobs:
  - job: DeployJob
    steps:

    - script: kubectl version --client

    # =========================
    # NAMESPACE
    # =========================
    - script: |
        kubectl get namespace $(namespace) || kubectl create namespace $(namespace)

    # =========================
    # SECRETS
    # =========================
    - script: kubectl apply -f k8s/secret.yaml -n $(namespace)

    # =========================
    # 🐘 POSTGRES
    # =========================
    - script: kubectl apply -f k8s/postgres-deployment.yaml -n $(namespace)

    - script: |
        echo "Waiting for Postgres..."
        kubectl rollout status deployment/postgres -n $(namespace) --timeout=300s

    # =========================
    # 🐰 RABBITMQ
    # =========================
    - script: kubectl apply -f k8s/rabbitmq-deployment.yaml -n $(namespace)

    - script: |
        echo "Waiting for RabbitMQ..."
        kubectl rollout status deployment/rabbitmq -n $(namespace) --timeout=300s

    # =========================
    # 🔴 REDIS
    # =========================
    - script: kubectl apply -f k8s/redis-deployment.yaml -n $(namespace)

    - script: |
        echo "Waiting for Redis..."
        kubectl rollout status deployment/redis -n $(namespace) --timeout=120s

    # =========================
    # 🧩 MICROSERVICES
    # =========================
    - script: kubectl apply -f k8s/catalog-deployment.yaml -n $(namespace)
    - script: kubectl apply -f k8s/basket-deployment.yaml -n $(namespace)
    - script: kubectl apply -f k8s/identity-deployment.yaml -n $(namespace)
    - script: kubectl apply -f k8s/ordering-deployment.yaml -n $(namespace)

    # =========================
    # 🌐 WEB APP
    # =========================
    - script: kubectl apply -f k8s/dotnet-deployment.yaml -n $(namespace)

    # =========================
    # 🌍 INGRESS
    # =========================
    - script: kubectl apply -f k8s/ingress.yaml -n $(namespace)

    # =========================
    # 📊 VERIFY
    # =========================
    - script: |
        echo "===== PODS ====="
        kubectl get pods -n $(namespace)

        echo "===== SERVICES ====="
        kubectl get svc -n $(namespace)

        echo "===== INGRESS ====="
        kubectl get ingress -n $(namespace)
