trigger:
- main

pool:
  name: eshop-agent

variables:
- group: docker-credentials

- name: namespace
  value: eshop

- name: dockerRepo
  value: pavankumarch1219

- name: imageTag
  value: latest

stages:

# =========================
# SONARQUBE STAGE
# =========================
- stage: SonarQube
  displayName: Code Quality Check
  jobs:
  - job: SonarJob
    steps:

    - checkout: self

    - task: SonarQubeToolInstaller@1

    - task: SonarQubePrepare@7
      inputs:
        SonarQube: 'sonar-local'
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: 'eshop-project'
        cliProjectName: 'eshop-project'
        cliSources: '.'

    - script: dotnet build
      displayName: Build

    - task: SonarQubeAnalyze@7

    - task: SonarQubePublish@7
      inputs:
        pollingTimeoutSec: '300'


# =========================
# DOCKER STAGE
# =========================
- stage: Docker
  dependsOn: SonarQube
  condition: succeeded()
  jobs:
  - job: DockerJob
    steps:

    - checkout: self

    - script: |
        echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
      env:
        DOCKER_USERNAME: $(DOCKER_USERNAME)
        DOCKER_PASSWORD: $(DOCKER_PASSWORD)

    - script: |
        docker build -t $(dockerRepo)/catalog-api:$(imageTag) -f src/Catalog.API/Dockerfile .
        docker push $(dockerRepo)/catalog-api:$(imageTag)


# =========================
# DEPLOY STAGE
# =========================
- stage: Deploy
  dependsOn: Docker
  jobs:
  - job: DeployJob
    steps:

    - checkout: self

    - script: kubectl get nodes

    - script: |
        kubectl get namespace $(namespace) || kubectl create namespace $(namespace)

    - script: kubectl apply -f k8s/ -n $(namespace)
