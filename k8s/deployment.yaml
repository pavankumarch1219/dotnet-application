apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-app
  namespace: eshop
  labels:
    app: dotnet-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: dotnet-app

  template:
    metadata:
      labels:
        app: dotnet-app

    spec:
      containers:
        - name: dotnet-app
          image: pavankumarch1219/dotnet-application:1.0.0
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 80

          env:
            # 🔹 Internal service URLs (via Kubernetes DNS)
            - name: IdentityUrl
              value: "http://identity-service"

            - name: CatalogUrl
              value: "http://catalog-service"

            - name: BasketUrl
              value: "http://basket-service"

            - name: OrderingUrl
              value: "http://ordering-service"

            # 🔹 RabbitMQ (via ConfigMap preferred)
            - name: EventBusConnection
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: RABBITMQ_HOST

            # 🔹 External callback (should match Ingress URL ideally)
            - name: CallBackUrl
              value: "http://20.29.210.83:32289"

            # 🔹 ASP.NET Core binding
            - name: ASPNETCORE_URLS
              value: "http://+:80"

            # 🔹 Fix HTTP protocol issues
            - name: ASPNETCORE_Kestrel__EndpointDefaults__Protocols
              value: "Http1AndHttp2"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # 🔹 Health checks (better endpoints if available)
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
