apiVersion: v1
kind: Service
metadata:
  name: dotnet-app
  namespace: eshop
  labels:
    app: dotnet-app

spec:
  type: NodePort

  selector:
    app: dotnet-app

  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-app
  namespace: eshop

spec:
  replicas: 1

  selector:
    matchLabels:
      app: dotnet-app

  template:
    metadata:
      labels:
        app: dotnet-app

    spec:
      containers:
        - name: dotnet-app
          image: pavankumarch1219/dotnet-application:latest

          ports:
            - containerPort: 80

          env:
            - name: ASPNETCORE_URLS
              value: http://+:80

            # 🔥 INTERNAL SERVICE URLS
            - name: IdentityUrl
              value: http://identity-service

            - name: CatalogUrl
              value: http://catalog-service

            - name: BasketUrl
              value: http://basket-service

            - name: OrderingUrl
              value: http://ordering-service

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ✅ FIXED PROBES (NO 404 ISSUE)
          startupProbe:
            tcpSocket:
              port: 80
            failureThreshold: 30
            periodSeconds: 5

          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
