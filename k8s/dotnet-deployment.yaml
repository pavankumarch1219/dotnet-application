apiVersion: v1
kind: Service
metadata:
  name: dotnet-app
  namespace: eshop
  labels:
    app: dotnet-app

spec:
  type: NodePort
  selector:
    app: dotnet-app

  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dotnet-app
  namespace: eshop

spec:
  replicas: 1

  selector:
    matchLabels:
      app: dotnet-app

  template:
    metadata:
      labels:
        app: dotnet-app

    spec:
      # 🔥 WAIT FOR REDIS
      initContainers:
        - name: wait-for-redis
          image: busybox
          command:
            - sh
            - -c
            - |
              echo "Waiting for Redis...";
              until nc -z redis 6379;
              do
                sleep 2;
              done;
              echo "Redis is ready";

      containers:
        - name: dotnet-app
          image: pavankumarch1219/dotnet-application:latest

          ports:
            - containerPort: 80

          env:
            - name: ASPNETCORE_URLS
              value: http://+:80

            # ✅ SERVICE URLs
            - name: IdentityUrl
              value: http://identity-service

            - name: CatalogUrl
              value: http://catalog-service

            - name: BasketUrl
              value: http://basket-service

            - name: OrderingUrl
              value: http://ordering-service

            # 🔴 REDIS
            - name: ConnectionStrings__Redis
              value: redis

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ✅ SAFE PROBES (NO 404 / NO CRASH)
          startupProbe:
            tcpSocket:
              port: 80
            failureThreshold: 30
            periodSeconds: 5

          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
