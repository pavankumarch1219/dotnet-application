apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eshop-ingress
  namespace: eshop

  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2

spec:
  ingressClassName: nginx

  rules:
    - http:
        paths:

          # 🌐 Web App
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dotnet-app
                port:
                  number: 80

          # 📦 Catalog
          - path: /catalog(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: catalog-service
                port:
                  number: 80

          # 🧺 Basket
          - path: /basket(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: basket-service
                port:
                  number: 80

          # 🔐 Identity
          - path: /identity(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: identity-service
                port:
                  number: 80

          # 📦 Ordering
          - path: /ordering(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ordering-service
                port:
                  number: 80
