apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eshop-ingress
  namespace: eshop

  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2

    #  FORCE HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"

spec:
  ingressClassName: nginx

  tls:
  - hosts:
      - eshop.local
    secretName: eshop-tls

  rules:
  - host: eshop.local
    http:
      paths:

      - path: /
        pathType: Prefix
        backend:
          service:
            name: dotnet-app
            port:
              number: 80

      - path: /catalog(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: catalog-api
            port:
              number: 80

      - path: /basket(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: basket-api
            port:
              number: 80

      - path: /identity(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: identity-api
            port:
              number: 80

      - path: /ordering(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: ordering-api
            port:
              number: 80
