apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: eshop-ingress
  namespace: eshop
spec:
  rules:
  - http:
      paths:
      - path: /catalog
        pathType: Prefix
        backend:
          service:
            name: catalog-service
            port:
              number: 80

      - path: /basket
        pathType: Prefix
        backend:
          service:
            name: basket-service
            port:
              number: 80

      - path: /identity
        pathType: Prefix
        backend:
          service:
            name: identity-service
            port:
              number: 80

      - path: /ordering
        pathType: Prefix
        backend:
          service:
            name: ordering-service
            port:
              number: 80
