# =========================
# 🐰 RABBITMQ SERVICE
# =========================
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: eshop
  labels:
    app: rabbitmq

spec:
  type: ClusterIP

  selector:
    app: rabbitmq

  ports:
    - name: amqp
      port: 5672
      targetPort: 5672

    - name: management
      port: 15672
      targetPort: 15672

---
# =========================
# 🐰 RABBITMQ DEPLOYMENT
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: eshop

spec:
  replicas: 1

  selector:
    matchLabels:
      app: rabbitmq

  template:
    metadata:
      labels:
        app: rabbitmq

    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine

          ports:
            - containerPort: 5672
            - containerPort: 15672

          env:
            # ✅ USE CUSTOM USER (IMPORTANT)
            - name: RABBITMQ_DEFAULT_USER
              value: admin

            - name: RABBITMQ_DEFAULT_PASS
              value: StrongPassword123!

            # ✅ DEFAULT VHOST
            - name: RABBITMQ_DEFAULT_VHOST
              value: /

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ✅ STARTUP PROBE
          startupProbe:
            tcpSocket:
              port: 5672
            failureThreshold: 30
            periodSeconds: 5

          # ✅ READINESS PROBE
          readinessProbe:
            tcpSocket:
              port: 5672
            initialDelaySeconds: 20
            periodSeconds: 10

          # ✅ LIVENESS PROBE
          livenessProbe:
            tcpSocket:
              port: 5672
            initialDelaySeconds: 40
            periodSeconds: 20

          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq

      volumes:
        - name: rabbitmq-data
          emptyDir: {}
