apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: eshop

spec:
  serviceName: rabbitmq
  replicas: 1

  selector:
    matchLabels:
      app: rabbitmq

  template:
    metadata:
      labels:
        app: rabbitmq

    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine

          ports:
            - containerPort: 5672
              name: amqp
            - containerPort: 15672
              name: management

          env:
            - name: RABBITMQ_DEFAULT_USER
              value: "guest"

            - name: RABBITMQ_DEFAULT_PASS
              value: "guest"

          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 20
            periodSeconds: 10

          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 40
            periodSeconds: 30

          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq

      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: rabbitmq-pvc
