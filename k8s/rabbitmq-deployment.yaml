---
# RabbitMQ credentials — replace values with base64-encoded strings
# To encode: echo -n 'yourpassword' | base64
apiVersion: v1
kind: Secret
metadata:
  name: rabbitmq-secret
  namespace: eshop
type: Opaque
data:
  # echo -n 'admin' | base64  =>  YWRtaW4=
  RABBITMQ_USER: YWRtaW4=
  # echo -n 'StrongPassword123!' | base64  =>  change this!
  RABBITMQ_PASS: U3Ryb25nUGFzc3dvcmQxMjMh

---
# RabbitMQ deployment updated to use the secret
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: eshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - containerPort: 5672
            - containerPort: 15672
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_USER
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_PASS
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "ping"]
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "-q", "check_port_connectivity"]
            initialDelaySeconds: 30
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: eshop
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
