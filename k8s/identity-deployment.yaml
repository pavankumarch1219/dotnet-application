apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: eshop
  labels:
    app: identity-api

spec:
  type: ClusterIP
  selector:
    app: identity-api

  ports:
    - name: http
      port: 80
      targetPort: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-api
  namespace: eshop

spec:
  replicas: 2

  selector:
    matchLabels:
      app: identity-api

  template:
    metadata:
      labels:
        app: identity-api

    spec:
      containers:
        - name: identity-api
          image: pavankumarch1219/identity-api:latest

          ports:
            - containerPort: 80

          env:
            - name: ConnectionStrings__IdentityDb
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: ConnectionStrings__IdentityDb

            - name: ASPNETCORE_URLS
              value: http://+:80

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ✅ Startup probe (prevents CrashLoopBackOff)
          startupProbe:
            httpGet:
              path: /
              port: 80
            failureThreshold: 30
            periodSeconds: 5

          # ✅ Readiness probe (added)
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

          # ✅ Liveness probe (added)
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
