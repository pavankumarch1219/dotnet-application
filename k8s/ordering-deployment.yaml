apiVersion: v1
kind: Service
metadata:
  name: ordering-service
  namespace: eshop
  labels:
    app: ordering-api

spec:
  type: ClusterIP
  selector:
    app: ordering-api

  ports:
    - name: http
      port: 80
      targetPort: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ordering-api
  namespace: eshop

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ordering-api

  template:
    metadata:
      labels:
        app: ordering-api

    spec:
      containers:
        - name: ordering-api
          image: pavankumarch1219/ordering-api:latest

          ports:
            - containerPort: 80

          env:
            - name: ConnectionStrings__OrderingDb
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: ConnectionStrings__OrderingDb

            # ✅ RabbitMQ (fixed correctly)
            - name: EventBus__HostName
              value: rabbitmq

            - name: EventBus__UserName
              value: guest

            - name: EventBus__Password
              value: guest

            - name: ASPNETCORE_URLS
              value: http://+:80

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ✅ Startup probe (prevents CrashLoopBackOff)
          startupProbe:
            httpGet:
              path: /
              port: 80
            failureThreshold: 30
            periodSeconds: 5

          # ✅ Readiness probe
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

          # ✅ Liveness probe (added for stability)
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15

