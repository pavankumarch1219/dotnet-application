apiVersion: apps/v1
kind: Deployment
metadata:
  name: ordering-api
  namespace: eshop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ordering-api

  template:
    metadata:
      labels:
        app: ordering-api

    spec:
      containers:
        - name: ordering-api
          image: pavankumarch1219/ordering-api:latest

          ports:
            - containerPort: 80

          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Development"

            # ✅ Use Secret for DB connection
            - name: ConnectionStrings__orderingdb
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: CONNECTION_STRING

            # ✅ RabbitMQ (correct as is)
            - name: EventBus__HostName
              value: "rabbitmq"
