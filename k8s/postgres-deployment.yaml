# =========================
# 🐘 POSTGRES SERVICE
# =========================
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: eshop
  labels:
    app: postgres

spec:
  type: ClusterIP

  selector:
    app: postgres

  ports:
    - name: db
      port: 5432
      targetPort: 5432

---
# =========================
# 🐘 POSTGRES INIT CONFIGMAP (SAFE)
# =========================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: eshop

data:
  init.sql: |
    DO $$
    BEGIN
      IF NOT EXISTS (SELECT FROM pg_database WHERE datname = 'catalogdb') THEN
        CREATE DATABASE catalogdb;
      END IF;

      IF NOT EXISTS (SELECT FROM pg_database WHERE datname = 'basketdb') THEN
        CREATE DATABASE basketdb;
      END IF;

      IF NOT EXISTS (SELECT FROM pg_database WHERE datname = 'identitydb') THEN
        CREATE DATABASE identitydb;
      END IF;

      IF NOT EXISTS (SELECT FROM pg_database WHERE datname = 'orderingdb') THEN
        CREATE DATABASE orderingdb;
      END IF;
    END $$;

---
# =========================
# 🐘 POSTGRES DEPLOYMENT
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: eshop

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg15

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_DB
              value: postgres

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: POSTGRES_PASSWORD

            # ✅ IMPORTANT FIX
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

            # ✅ INIT SCRIPT MOUNT
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ✅ STARTUP PROBE
          startupProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            failureThreshold: 30
            periodSeconds: 5

          # ✅ READINESS PROBE
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 20
            periodSeconds: 10

          # ✅ LIVENESS PROBE
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 15

      volumes:
        # ⚠️ DEV STORAGE (OK for you)
        - name: postgres-storage
          emptyDir: {}

        - name: postgres-init
          configMap:
            name: postgres-init
