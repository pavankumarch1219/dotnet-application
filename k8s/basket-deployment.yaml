apiVersion: apps/v1
kind: Deployment
metadata:
  name: basket-api
  namespace: eshop
  labels:
    app: basket-api
 
spec:
  replicas: 2
  selector:
    matchLabels:
      app: basket-api
 
  template:
    metadata:
      labels:
        app: basket-api
 
    spec:
      containers:
        - name: basket-api
          image: pavankumarch1219/basket-api:1.0.0   #  fixed version (no latest)
          imagePullPolicy: IfNotPresent
 
          ports:
            - containerPort: 80
 
          env:
            # Database
            - name: ConnectionStrings__BasketDb
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: BASKET_DB
 
            # RabbitMQ credentials
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_USER
 
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_PASS
 
            # RabbitMQ connection ( verify service name)
            - name: ConnectionStrings__EventBus
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASS)@rabbitmq:5672"
 
            # ASP.NET Core binding
            - name: ASPNETCORE_URLS
              value: "http://+:80"
 
            #  FIX: Allow both HTTP/1.1 and HTTP/2
            - name: ASPNETCORE_Kestrel__EndpointDefaults__Protocols
              value: "Http1AndHttp2"
 
            # Identity service (internal)
            - name: IdentityUrl
              value: "http://identity-service/identity"
 
            # Identity external (for redirects)
            - name: IdentityUrlExternal
              value: "http://20.245.67.161:30694/identity"
 
            #  Removed PathBase to avoid 404 issues
 
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
 
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
 
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10
