apiVersion: apps/v1
kind: Deployment
metadata:
  name: basket-api
  namespace: eshop
spec:
  replicas: 2

  selector:
    matchLabels:
      app: basket-api

  template:
    metadata:
      labels:
        app: basket-api

    spec:
      containers:
        - name: basket-api
          image: pavankumarch1219/basket-api:latest

          ports:
            - containerPort: 80

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ✅ FIXED: Correct DB + RabbitMQ config
          env:
            - name: ConnectionStrings__BasketDb
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key:  ConnectionStrings__BasketDb

            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_USER

            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_PASS

            - name: ConnectionStrings__EventBus
              value: amqp://$(RABBITMQ_USER):$(RABBITMQ_PASS)@rabbitmq:5672

            - name: ASPNETCORE_URLS
              value: http://+:80

            - name: ASPNETCORE_Kestrel__EndpointDefaults__Protocols
              value: Http1AndHttp2

            - name: IdentityUrl
              value: http://identity-service/identity

            - name: IdentityUrlExternal
              value: http://20.220.149.85:31306/identity

          # ✅ FIXED: Working health probes
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
