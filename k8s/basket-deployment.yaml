apiVersion: v1
kind: Service
metadata:
  name: basket-api
  namespace: eshop

spec:
  type: ClusterIP
  selector:
    app: basket-api

  ports:
    - port: 80
      targetPort: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: basket-api
  namespace: eshop

spec:
  replicas: 2

  selector:
    matchLabels:
      app: basket-api

  template:
    metadata:
      labels:
        app: basket-api

    spec:
      # 🔥 WAIT FOR REDIS
      initContainers:
        - name: wait-for-redis
          image: busybox
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379;
              do
                echo "Waiting for Redis...";
                sleep 2;
              done;

      containers:
        - name: basket-api
          image: pavankumarch1219/basket-api:latest

          ports:
            - containerPort: 80

          env:
            - name: ConnectionStrings__Redis
              value: redis

            - name: ConnectionStrings__EventBus
              value: amqp://guest:guest@rabbitmq:5672

            - name: ASPNETCORE_URLS
              value: http://+:80

            - name: ASPNETCORE_Kestrel__EndpointDefaults__Protocols
              value: Http2

            - name: Identity__Audience
              value: basket

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ✅ gRPC SAFE
          startupProbe:
            tcpSocket:
              port: 80
            failureThreshold: 30

          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10

          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
