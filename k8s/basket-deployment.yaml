apiVersion: v1
kind: Service
metadata:
  name: basket-service
  namespace: eshop
  labels:
    app: basket-api

spec:
  type: ClusterIP
  selector:
    app: basket-api

  ports:
    - name: http
      port: 80
      targetPort: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: basket-api
  namespace: eshop
spec:
  replicas: 2

  selector:
    matchLabels:
      app: basket-api

  template:
    metadata:
      labels:
        app: basket-api

    spec:
      containers:
        - name: basket-api
          image: pavankumarch1219/basket-api:latest

          ports:
            - containerPort: 80

          env:
            - name: ConnectionStrings__BasketDb
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: ConnectionStrings__BasketDb

            # ✅ RabbitMQ (fixed)
            - name: ConnectionStrings__EventBus
              value: amqp://guest:guest@rabbitmq:5672

            - name: ASPNETCORE_URLS
              value: http://+:80

            - name: IdentityUrl
              value: http://identity-service

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # Startup probe (prevents CrashLoopBackOff)
          startupProbe:
            httpGet:
              path: /
              port: 80
            failureThreshold: 30
            periodSeconds: 5

          # Readiness probe
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

          # Liveness probe
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
