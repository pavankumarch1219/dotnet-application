apiVersion: apps/v1
kind: Deployment
metadata:
  name: basket-api
  namespace: eshop
  labels:
    app: basket-api

spec:
  replicas: 2
  selector:
    matchLabels:
      app: basket-api

  template:
    metadata:
      labels:
        app: basket-api

    spec:
      containers:
        - name: basket-api
          image: pavankumarch1219/basket-api:1.0.0
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 80

          env:
            - name: ConnectionStrings__BasketDb
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: BASKET_DB

            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_USER

            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_PASS

            - name: ConnectionStrings__EventBus
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASS)@rabbitmq:5672"

            - name: ASPNETCORE_URLS
              value: "http://+:80"

            # ✅ FIXED (double underscore)
            - name: ASPNETCORE_Kestrel__EndpointDefaults__Protocols
              value: "Http1AndHttp2"

            - name: IdentityUrl
              value: "http://identity-service/identity"

            - name: IdentityUrlExternal
              value: "http://20.245.67.161:30694/identity"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15

          readinessProbe:
            httpGet:
              path: /health/ready
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10
