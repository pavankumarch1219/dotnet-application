apiVersion: apps/v1
kind: Deployment
metadata:
  name: basket-api

spec:
  replicas: 1
  selector:
    matchLabels:
      app: basket-api

  template:
    metadata:
      labels:
        app: basket-api

    spec:
      containers:
      - name: basket-api
        image: pavankumarch1219/basket-api:latest
        ports:
        - containerPort: 8080
