apiVersion: v1
kind: Service
metadata:
  name: basket-service
  namespace: eshop
  labels:
    app: basket-api

spec:
  type: ClusterIP

  selector:
    app: basket-api

  ports:
    - name: grpc
      port: 80
      targetPort: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: basket-api
  namespace: eshop

spec:
  replicas: 2

  selector:
    matchLabels:
      app: basket-api

  template:
    metadata:
      labels:
        app: basket-api

    spec:
      containers:
        - name: basket-api
          image: pavankumarch1219/basket-api:latest

          ports:
            - containerPort: 80

          env:
            # 🔥 DATABASE / REDIS
            - name: ConnectionStrings__Redis
              value: redis

            # 🔥 RABBITMQ
            - name: ConnectionStrings__EventBus
              value: amqp://guest:guest@rabbitmq:5672

            # 🔥 FORCE HTTP/2 (VERY IMPORTANT)
            - name: ASPNETCORE_URLS
              value: http://+:80

            - name: ASPNETCORE_Kestrel__EndpointDefaults__Protocols
              value: Http2

            # 🔥 IDENTITY
            - name: Identity__Audience
              value: basket

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ✅ FIXED (gRPC safe)
          startupProbe:
            tcpSocket:
              port: 80
            failureThreshold: 30
            periodSeconds: 5

          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
