apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
  namespace: eshop
  labels:
    app: catalog-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: catalog-api

  template:
    metadata:
      labels:
        app: catalog-api

    spec:
      containers:
        - name: catalog-api
          image: pavankumarch1219/catalog-api:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 80

          env:
            # ✅ FIXED DB CONNECTION
            - name: ConnectionStrings__CatalogDb
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: ConnectionStrings__CatalogDb

            # ✅ RabbitMQ
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_USER

            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_PASS

            # ✅ EventBus
            - name: ConnectionStrings__EventBus
              value: amqp://$(RABBITMQ_USER):$(RABBITMQ_PASS)@rabbitmq:5672

            # ✅ ASP.NET
            - name: ASPNETCORE_URLS
              value: http://+:80

            - name: ASPNETCORE_Kestrel__EndpointDefaults__Protocols
              value: Http1AndHttp2

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
