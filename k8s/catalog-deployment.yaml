apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
  namespace: eshop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-api

  template:
    metadata:
      labels:
        app: catalog-api

    spec:
      containers:
      - name: catalog-api
        image: pavankumarch1219/catalog-api:latest

        ports:
        - containerPort: 80

        envFrom:
        - configMapRef:
            name: app-config

        env:
        - name: ConnectionStrings__catalogdb
          value: "Host=postgres;Port=5432;Database=catalogdb;Username=postgres;Password=postgres"

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
