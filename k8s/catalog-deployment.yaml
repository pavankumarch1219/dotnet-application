apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
  namespace: eshop
  labels:
    app: catalog-api

spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-api

  template:
    metadata:
      labels:
        app: catalog-api

    spec:
      containers:
        - name: catalog-api
          image: pavankumarch1219/catalog-api:1.0.0   #  fixed version
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 80

          env:
            # Database
            - name: ConnectionStrings__catalogdb
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: CATALOG_DB

            # RabbitMQ credentials
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_USER

            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-secret
                  key: RABBITMQ_PASS

            # RabbitMQ connection ( verify service name)
            - name: ConnectionStrings__EventBus
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASS)@rabbitmq:5672"

            # ASP.NET Core binding
            - name: ASPNETCORE_URLS
              value: "http://+:80"

            #  FIX: Support both HTTP/1.1 and HTTP/2
            - name: ASPNETCORE_Kestrel__EndpointDefaults__Protocols
              value: "Http1AndHttp2"

            #  Removed PathBase (causing 404 issues with ingress)

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health/ready
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10
