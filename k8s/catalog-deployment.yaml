apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
  namespace: eshop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-api
  template:
    metadata:
      labels:
        app: catalog-api
    spec:
      containers:
        - name: catalog-api
          image: pavankumarch1219/catalog-api:latest
          ports:
            - containerPort: 80

          env:
            - name: ConnectionStrings__DefaultConnection
              value: Host=postgres;Port=5432;Database=catalogdb;Username=postgres;Password=postgres

            - name: ASPNETCORE_URLS
              value: http://+:80

          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 15
