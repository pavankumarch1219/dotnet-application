apiVersion: v1
kind: Service
metadata:
  name: catalog-api
  namespace: eshop

spec:
  type: ClusterIP
  selector:
    app: catalog-api

  ports:
    - port: 80
      targetPort: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
  namespace: eshop

spec:
  replicas: 2

  selector:
    matchLabels:
      app: catalog-api

  template:
    metadata:
      labels:
        app: catalog-api

    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox
          command: ["sh", "-c", "until nc -z redis 6379; do echo waiting for redis; sleep 2; done"]

      containers:
        - name: catalog-api
          image: pavankumarch1219/catalog-api:latest

          ports:
            - containerPort: 80

          env:
            - name: ConnectionStrings__CatalogDb
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: ConnectionStrings__CatalogDb

            - name: ConnectionStrings__Redis
              value: redis

            - name: ConnectionStrings__EventBus
              value: amqp://guest:guest@rabbitmq:5672

            - name: ASPNETCORE_URLS
              value: http://+:80

          # ✅ FIXED PROBES
          startupProbe:
            tcpSocket:
              port: 80
            failureThreshold: 30

          readinessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 10

          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
