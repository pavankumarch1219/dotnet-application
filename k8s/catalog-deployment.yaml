apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
  namespace: eshop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-api
  template:
    metadata:
      labels:
        app: catalog-api
    spec:
      containers:
        - name: catalog-api
          image: pavankumarch1219/catalog-api:latest
          ports:
            - containerPort: 80

          env:
            - name: ConnectionStrings__catalogdb
              value: Host=postgres.eshop.svc.cluster.local;Port=5432;Database=catalogdb;Username=postgres;Password=postgres

          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
