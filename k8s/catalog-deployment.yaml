apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api

spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-api

  template:
    metadata:
      labels:
        app: catalog-api

    spec:
      containers:
      - name: catalog-api
        image: pavankumarch1219/catalog-api:latest
        ports:
        - containerPort: 8080
