apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: eshop
  labels:
    app: catalog-api

spec:
  type: ClusterIP
  selector:
    app: catalog-api

  ports:
    - name: http
      port: 80
      targetPort: 80

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
  namespace: eshop

spec:
  replicas: 2

  selector:
    matchLabels:
      app: catalog-api

  template:
    metadata:
      labels:
        app: catalog-api

    spec:
      containers:
        - name: catalog-api
          image: pavankumarch1219/catalog-api:latest

          ports:
            - containerPort: 80

          env:
            - name: ConnectionStrings__CatalogDb
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: ConnectionStrings__CatalogDb

            # ✅ RabbitMQ fixed
            - name: ConnectionStrings__EventBus
              value: amqp://guest:guest@rabbitmq:5672

            - name: ASPNETCORE_URLS
              value: http://+:80

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # ✅ Startup probe (prevents CrashLoopBackOff)
          startupProbe:
            httpGet:
              path: /
              port: 80
            failureThreshold: 30
            periodSeconds: 5

          # ✅ Readiness probe
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10

          # ✅ Liveness probe (added for stability)
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 15

