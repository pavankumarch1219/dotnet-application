apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
  namespace: eshop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: catalog-api
  template:
    metadata:
      labels:
        app: catalog-api
    spec:
      containers:
        - name: catalog-api
          image: pavankumarch1219/catalog-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: ConnectionStrings__catalogdb
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: CATALOG_DB
            - name: ConnectionStrings__EventBus
              value: amqp://guest:guest@rabbitmq:5672
            - name: ASPNETCORE_URLS
              value: http://+:80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
